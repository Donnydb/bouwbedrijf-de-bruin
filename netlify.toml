# Netlify build- en deploy-configuratie voor Bouwbedrijf De Bruin (statische Astro-site)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Houd dit gelijk aan je lokale Node-versie (LTS).
  NODE_VERSION = "22"

# ──────────────────────────────────────────────────────────────
#  Caching & security headers (helpt Lighthouse "Best Practices")
# ──────────────────────────────────────────────────────────────

# Gehashte build-assets (incl. de zelf-gehoste fonts) mogen lang gecached
# worden — Astro zet ze met een contenthash in /_astro/.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Veilige standaard-headers voor alle pagina's.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# ──────────────────────────────────────────────────────────────
#  Netlify Forms
#  Het contactformulier wordt automatisch herkend dankzij
#  `data-netlify="true"` in de statische HTML. Na verzending
#  redirect het naar /bedankt/ (zie action op het formulier).
#  Stel in het Netlify-dashboard een e-mailnotificatie in naar
#  info@stukadoorsdebruin.nl (Forms → Settings → Notifications).
# ──────────────────────────────────────────────────────────────
